    :root {
      --bg-color: #0A0A0A;
      --card-bg: #121214;
      --border-color: #27272a;
      --text-primary: #ffffff;
      --text-secondary: #a1a1aa;

    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-sans);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 320px;
      background-color: #0c0c0e;
      border-right: 1px solid var(--border-color);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    .logo-badge {
      width: 24px;
      height: 24px;
      background-color: var(--accent-color);
      border-radius: 6px;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    .template-btn {
      background: none;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      text-align: left;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .template-btn:hover {
      border-color: var(--text-muted);
      color: var(--text-primary);
      background-color: rgba(255, 255, 255, 0.02);
    }

    .template-btn.active {
      border-color: var(--accent-color);
      color: var(--text-primary);
      background-color: rgba(206, 28, 28, 0.04);
      box-shadow: 0 0 20px rgba(206, 28, 28, 0.1);
    }

    .template-name {
      font-size: 14px;
      font-weight: 600;
    }

    .template-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Interactive Switchers */
    .toggle-container {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      padding: 3px;
    }

    .toggle-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .toggle-btn.active {
      background-color: var(--border-color);
      color: var(--text-primary);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: #060607;
    }

    .top-bar {
      height: 64px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background-color: #0c0c0e;
    }

    .bar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .preview-title {
      font-size: 15px;
      font-weight: 600;
    }

    .preview-badge {
      font-size: 10px;
      background-color: rgba(255, 255, 255, 0.08);
      padding: 3px 8px;
      border-radius: 4px;
      color: var(--text-secondary);

    .viewport-controls {
      display: flex;
      gap: 8px;
    }

      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;

      color: var(--text-primary);
      background-color: rgba(206, 28, 28, 0.04);

      align-items: center;

      padding: 32px;

      height: 100%;
      display: flex;
      flex-direction: column;

      height: 36px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;

      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
      opacity: 0.5;

    .frame-dot:nth-child(2) { background-color: #f59e0b; opacity: 1; }
    .frame-dot:nth-child(3) { background-color: #10b981; opacity: 1; }

      border-radius: 6px;
      max-width: 300px;
      margin: 0 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #0A0A0A;
    }

    let currentTemplate = 'editorial';

    function updatePreview() {
      const template = templates[currentTemplate];
      let html = template.html;

      if (viewMode === 'rendered') {
        // Substitute example values
        html = html.replace(/\{\{NAME\}\}/g, 'John');
        html = html.replace(/\{\{EMAIL\}\}/g, 'john@example.com');

        html = html.replace(/\{\{UNSUBSCRIBE_URL\}\}/g, '{{{RESEND_UNSUBSCRIBE_URL}}}');
      }

      const iframe = document.getElementById('preview-iframe');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();

      // Update Top Bar titles
      document.getElementById('bar-template-name').textContent = template.name;
      document.getElementById('bar-view-mode').textContent = viewMode === 'rendered' ? 'Rendered View' : 'Raw Tag Mode';
      document.getElementById('preview-url-bar').textContent = `http://abram.network/campaign/preview?template=${currentTemplate}&mode=${viewMode}`;
    }

    function selectTemplate(id) {
      // Manage Active State
      document.querySelectorAll('.template-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${id}`).classList.add('active');

      currentTemplate = id;
      updatePreview();
    }

    function setViewMode(mode) {
      document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${mode === 'rendered' ? 'render' : 'tags'}`).classList.add('active');

      viewMode = mode;
      updatePreview();
    }

    function setViewport(size) {
      document.querySelectorAll('.viewport-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn-${size}`).classList.add('active');

      const container = document.getElementById('preview-container');
      if (size === 'mobile') {
        container.classList.add('mobile');
      } else {
        container.classList.remove('mobile');
      }
